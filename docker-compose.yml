services:
  backoffice:
    container_name: droits_backoffice
    build:
      context: ./backoffice
    image: droits-backoffice
    ports:
      - "${HOST_PORT:-5005}:5000"
      # Todo: Resolve the following issue when trying to submit a wreck report "droits_webapp      | [0] Issue submitting droit report: ECONNREFUSED - post - http://127.0.0.1:5001/Api/SubmitDroit"
      - "5001:5001"
    environment:
      ASPNETCORE_Kestrel__Certificates__Default__Password: "password"
      ASPNETCORE_Kestrel__Certificates__Default__Path: "/https/aspnetapp.pfx"
      DB_HOST: 'database'
    volumes:
      - ~/.aspnet/https:/https:ro
    depends_on:
      database:
        condition: service_healthy

  webapp:
    container_name: droits_webapp
    build:
      context: ./webapp
    image: droits-webapp
    environment:
      REDIS_HOST: 'redis'
    ports:
      - "3000:3000"
    depends_on:
      - backoffice
      - redis

  database:
    image: postgres:14-alpine
    container_name: droits_database
    volumes:
      - ~/apps/droits_db/pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: droits
      POSTGRES_USER: service
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U service -d droits"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: droits_redis
    ports:
      - "6379:6379"
